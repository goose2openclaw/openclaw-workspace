<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙️ Voice Widget</title>
<style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #00d4aa;
  --primary-dim: rgba(0,212,170,0.15);
  --bg-dark: rgba(15,20,30,0.92);
  --bg-panel: rgba(22,27,39,0.97);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --text-dim: #64748b;
  --danger: #ef4444;
  --warn: #f59e0b;
  --success: #10b981;
  --radius: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

/* === TOGGLE BUTTON (floating) === */
#voiceToggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 99999;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #0f1419, #1a2332);
  box-shadow: var(--shadow), 0 0 0 1px var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  color: var(--primary);
}
#voiceToggle:hover {
  transform: scale(1.1);
  box-shadow: var(--shadow), 0 0 0 2px var(--primary), 0 0 20px rgba(0,212,170,0.3);
}
#voiceToggle svg { width: 24px; height: 24px; fill: currentColor; }
#voiceToggle.recording {
  background: linear-gradient(135deg, #7f1d1d, #991b1b);
  color: white;
  animation: pulse-btn 1.5s infinite;
}
@keyframes pulse-btn {
  0%, 100% { box-shadow: var(--shadow), 0 0 0 0 rgba(239,68,68,0.5); }
  50% { box-shadow: var(--shadow), 0 0 0 12px rgba(239,68,68,0); }
}

/* === PANEL === */
#voicePanel {
  position: fixed;
  bottom: 88px;
  right: 24px;
  z-index: 99998;
  width: 340px;
  max-height: 520px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(20px) scale(0.95);
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter: blur(20px);
}
#voicePanel.open {
  transform: translateY(0) scale(1);
  opacity: 1;
  pointer-events: auto;
}

/* === HEADER === */
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,212,170,0.05);
}
.panel-header h3 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-header h3 svg { width: 16px; height: 16px; }
.panel-close {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  transition: all var(--transition);
}
.panel-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.panel-close svg { width: 16px; height: 16px; }

/* === BODY === */
.panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

/* API Key */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input, .field select {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 0.82rem;
  transition: border-color var(--transition);
}
.field input:focus, .field select:focus { outline: none; border-color: var(--primary); }
.field input::placeholder { color: var(--text-dim); }
select option { background: #1a2332; }
.field-hint { font-size: 0.65rem; color: var(--text-dim); }

/* Mode Toggle */
.mode-toggle {
  display: flex;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 3px;
  gap: 3px;
}
.mode-btn {
  flex: 1;
  padding: 7px 8px;
  border: none;
  border-radius: 6px;
  background: none;
  color: var(--text-dim);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.mode-btn.active { background: var(--primary); color: #0a0e17; font-weight: 600; }
.mode-btn svg { width: 14px; height: 14px; }

/* Mic Button */
.mic-section { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 8px 0; }

.mic-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
}
.mic-btn:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,170,0.15); }
.mic-btn.recording {
  background: linear-gradient(135deg, #7f1d1d, #991b1b);
  animation: pulse-mic 1.2s infinite;
}
.mic-btn.recording::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--danger);
  animation: mic-ring 1.2s infinite;
}
@keyframes pulse-mic { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes mic-ring { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0} }
.mic-btn svg { width: 28px; height: 28px; fill: var(--text-dim); transition: fill var(--transition); }
.mic-btn:hover svg, .mic-btn.recording svg { fill: white; }

.mic-status {
  font-size: 0.78rem;
  color: var(--text-dim);
  text-align: center;
  min-height: 20px;
}
.mic-status.recording { color: var(--danger); }
.mic-status.processing { color: var(--warn); }
.mic-status.done { color: var(--success); }

/* Waveform */
.waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 28px;
}
.waveform.hidden { display: none; }
.wave-bar {
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(to top, var(--primary), #7c3aed);
  animation: wave-anim 0.7s ease-in-out infinite;
}
.wave-bar:nth-child(1){height:6px;animation-delay:0s}
.wave-bar:nth-child(2){height:12px;animation-delay:0.08s}
.wave-bar:nth-child(3){height:18px;animation-delay:0.16s}
.wave-bar:nth-child(4){height:24px;animation-delay:0.24s}
.wave-bar:nth-child(5){height:28px;animation-delay:0.32s}
.wave-bar:nth-child(6){height:24px;animation-delay:0.40s}
.wave-bar:nth-child(7){height:18px;animation-delay:0.48s}
.wave-bar:nth-child(8){height:12px;animation-delay:0.56s}
.wave-bar:nth-child(9){height:6px;animation-delay:0.64s}
@keyframes wave-anim { 0%,100%{transform:scaleY(0.35)} 50%{transform:scaleY(1)} }

/* Transcript */
.transcript {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  min-height: 64px;
  max-height: 120px;
  overflow-y: auto;
  font-size: 0.85rem;
  line-height: 1.55;
  color: var(--text);
  display: none;
}
.transcript.show { display: block; }
.transcript:empty::before, .transcript .empty { content: attr(data-placeholder); color: var(--text-dim); font-style: italic; }

/* Scrollbar */
.transcript::-webkit-scrollbar { width: 4px; }
.transcript::-webkit-scrollbar-track { background: transparent; }
.transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Actions */
.actions { display: flex; gap: 8px; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
.actions.show { opacity: 1; pointer-events: auto; }

.btn {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all var(--transition);
}
.btn svg { width: 13px; height: 13px; }
.btn-primary { background: var(--primary); color: #0a0e17; }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost {
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* Copy to Clipboard target */
#pasteTarget {
  position: fixed;
  top: -9999px;
  left: -9999px;
  opacity: 0;
  pointer-events: none;
}

/* Toast */
#voiceToast {
  position: fixed;
  bottom: 90px;
  right: 24px;
  z-index: 999999;
  background: var(--primary);
  color: #0a0e17;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 0.78rem;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
#voiceToast.show { transform: translateY(0); opacity: 1; }
#voiceToast.error { background: var(--danger); color: white; }

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.panel-body { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<!-- Toggle Button -->
<button id="voiceToggle" title="🎙️ 语音输入 (V)">
  <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
</button>

<!-- Panel -->
<div id="voicePanel">
  <div class="panel-header">
    <h3>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      语音输入
    </h3>
    <button class="panel-close" id="closeBtn" title="关闭">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <div class="panel-body">
    <!-- API Key -->
    <div class="field">
      <label>🔑 OpenAI API Key</label>
      <input type="password" id="apiKey" placeholder="sk-... ( Whisper API 模式必填 )" autocomplete="off">
      <span class="field-hint">必填：https://platform.openai.com/api-keys</span>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeBrowser" data-mode="browser">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        浏览器
      </button>
      <button class="mode-btn" id="modeWhisper" data-mode="whisper">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        Whisper API
      </button>
    </div>

    <!-- Mic Button -->
    <div class="mic-section">
      <div class="waveform hidden" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>

      <button class="mic-btn" id="micBtn" title="按住说话，松开识别">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>

      <p class="mic-status" id="micStatus">点击麦克风开始</p>
    </div>

    <!-- Transcript -->
    <div class="transcript" id="transcript" data-placeholder="识别结果..."></div>

    <!-- Actions -->
    <div class="actions" id="actions">
      <button class="btn btn-primary" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        复制
      </button>
      <button class="btn btn-ghost" id="clearBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        清空
      </button>
    </div>
  </div>
</div>

<!-- Hidden paste target -->
<input type="text" id="pasteTarget" tabindex="-1">

<!-- Toast -->
<div id="voiceToast"></div>

<script>
(function() {
  // ── State ──────────────────────────────────────────
  let mode = localStorage.getItem('ov_mode') || 'browser';
  let apiKey = localStorage.getItem('ov_apiKey') || '';
  let isOpen = false;
  let isRecording = false;
  let recognition = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let finalTranscript = '';

  // ── Elements ───────────────────────────────────────
  const panel = document.getElementById('voicePanel');
  const toggle = document.getElementById('voiceToggle');
  const closeBtn = document.getElementById('closeBtn');
  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('micStatus');
  const waveform = document.getElementById('waveform');
  const transcript = document.getElementById('transcript');
  const actions = document.getElementById('actions');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');
  const apiKeyInput = document.getElementById('apiKey');
  const modeBrowser = document.getElementById('modeBrowser');
  const modeWhisper = document.getElementById('modeWhisper');
  const pasteTarget = document.getElementById('pasteTarget');
  const toast = document.getElementById('voiceToast');

  // Init UI from saved state
  apiKeyInput.value = apiKey;
  setMode(mode);

  // ── Toast ──────────────────────────────────────────
  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = 'voice-toast' + (isError ? ' error' : '');
    // reuse the #voiceToast style
    toast.style.cssText = `position:fixed;bottom:90px;right:24px;z-index:999999;background:${isError?'#ef4444':'#00d4aa'};color:${isError?'#fff':'#0a0e17'};padding:10px 20px;border-radius:50px;font-size:0.78rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4);transform:translateY(20px);opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;right:24px`;
    requestAnimationFrame(() => {
      toast.style.transform = 'translateY(0)';
      toast.style.opacity = '1';
    });
    setTimeout(() => {
      toast.style.transform = 'translateY(20px)';
      toast.style.opacity = '0';
    }, 2200);
  }

  // ── Panel Toggle ────────────────────────────────────
  function openPanel() {
    isOpen = true;
    panel.classList.add('open');
    toggle.classList.add('open');
  }
  function closePanel() {
    isOpen = false;
    panel.classList.remove('open');
  }
  toggle.addEventListener('click', () => isOpen ? closePanel() : openPanel());
  closeBtn.addEventListener('click', closePanel);

  // ── Mode ───────────────────────────────────────────
  function setMode(m) {
    mode = m;
    localStorage.setItem('ov_mode', m);
    modeBrowser.classList.toggle('active', m === 'browser');
    modeWhisper.classList.toggle('active', m === 'whisper');
  }
  modeBrowser.addEventListener('click', () => setMode('browser'));
  modeWhisper.addEventListener('click', () => setMode('whisper'));

  // ── API Key ────────────────────────────────────────
  apiKeyInput.addEventListener('change', () => {
    apiKey = apiKeyInput.value.trim();
    localStorage.setItem('ov_apiKey', apiKey);
  });

  // ── Browser STT ─────────────────────────────────────
  function initBrowserSTT() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('浏览器不支持语音识别', true); return null; }

    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'zh-CN';

    r.onstart = () => setUI('recording', '🎤 聆听中...松开停止');
    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += t;
        else interim += t;
      }
      transcript.textContent = finalTranscript + interim;
      transcript.classList.add('show');
      actions.classList.add('show');
    };
    r.onerror = (e) => {
      if (e.error !== 'no-speech') showToast('识别错误: ' + e.error, true);
      stopRecording();
    };
    r.onend = () => { if (isRecording) r.start(); };
    return r;
  }

  // ── UI State ───────────────────────────────────────
  function setUI(state, text) {
    status.className = 'mic-status ' + state;
    status.textContent = text;
    micBtn.classList.toggle('recording', state === 'recording');
    waveform.classList.toggle('hidden', state !== 'recording');
    if (state === 'done') { setTimeout(() => setUI('', '点击麦克风开始'), 2500); }
  }

  // ── Start Recording ────────────────────────────────
  async function startRecording() {
    if (isRecording) return;
    finalTranscript = '';
    transcript.textContent = '';
    transcript.classList.remove('show');
    actions.classList.remove('show');

    if (mode === 'browser') {
      if (!recognition) recognition = initBrowserSTT();
      if (!recognition) return;
      try { recognition.start(); } catch(e) { showToast('启动失败: ' + e.message, true); return; }
    } else {
      // Whisper API mode
      if (!apiKey) { showToast('请先输入 OpenAI API Key', true); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstart = () => setUI('recording', '🎤 录音中...松开识别');
        mediaRecorder.onstop = async () => {
          setUI('processing', '⏳ 识别中...');
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          try {
            const fd = new FormData();
            fd.append('file', blob, 'recording.webm');
            fd.append('model', 'whisper-1');
            fd.append('language', 'zh');
            const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + apiKey },
              body: fd
            });
            if (!resp.ok) {
              const err = await resp.json().catch(()=>({}));
              throw new Error(err.error?.message || 'API错误 ' + resp.status);
            }
            const data = await resp.json();
            finalTranscript = data.text;
            transcript.textContent = finalTranscript;
            transcript.classList.add('show');
            actions.classList.add('show');
            setUI('done', '✓ 识别完成');
            showToast('识别成功！');
          } catch(e) {
            showToast('识别失败: ' + e.message, true);
            setUI('error', '识别失败');
          }
        };
        mediaRecorder.start();
      } catch(e) {
        showToast('无法访问麦克风: ' + e.message, true);
      }
    }
    isRecording = true;
  }

  // ── Stop Recording ──────────────────────────────────
  function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    if (mode === 'browser' && recognition) {
      recognition.stop();
    }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    if (mode === 'browser') setUI('done', '✓ 识别完成');
  }

  // ── Mic Events ─────────────────────────────────────
  micBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('mouseup', e => { e.preventDefault(); stopRecording(); });
  micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
  micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
  micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); }, { passive: false });

  // ── Copy ───────────────────────────────────────────
  copyBtn.addEventListener('click', async () => {
    const text = transcript.textContent.trim();
    if (!text) { showToast('无内容可复制', true); return; }
    try {
      await navigator.clipboard.writeText(text);
      showToast('已复制到剪贴板！');
    } catch(e) {
      pasteTarget.value = text;
      pasteTarget.select();
      document.execCommand('copy');
      showToast('已复制到剪贴板！');
    }
  });

  // ── Clear ──────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    finalTranscript = '';
    transcript.textContent = '';
    transcript.classList.remove('show');
    actions.classList.remove('show');
    setUI('', '点击麦克风开始');
  });

  // ── Keyboard Shortcut: V ───────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'v' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      e.preventDefault();
      if (!isOpen) openPanel();
      else closePanel();
    }
    if (e.key === 'Escape' && isOpen) closePanel();
    // Hold space to record
    if (e.code === 'Space' && !e.repeat && e.target === document.body) {
      e.preventDefault();
      startRecording();
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space' && isRecording) {
      e.preventDefault();
      stopRecording();
    }
  });

})();
</script>
</body>
</html>
