<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙️ OpenClaw 语音输入</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0e6ed;
  }
  
  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  
  h1 {
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #00d4aa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 0.85rem;
    margin-bottom: 32px;
  }
  
  /* API Key Section */
  .api-section {
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }
  
  .api-section label {
    display: block;
    font-size: 0.75rem;
    color: #00d4aa;
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  
  .api-section input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 12px;
    color: #e0e6ed;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }
  
  .api-section input:focus {
    outline: none;
    border-color: #00d4aa;
  }
  
  .api-section .hint {
    font-size: 0.7rem;
    color: #64748b;
    margin-top: 6px;
  }
  
  /* Mic Button */
  .mic-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  
  .mic-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
    background: linear-gradient(135deg, #1a1f2e, #2d3548);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  
  .mic-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 40px rgba(0,212,170,0.2);
  }
  
  .mic-btn.recording {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    animation: pulse-ring 1.5s infinite;
  }
  
  .mic-btn.recording::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid #ef4444;
    animation: ripple 1.5s infinite;
  }
  
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { box-shadow: 0 0 0 15px rgba(239,68,68,0); }
  }
  
  @keyframes ripple {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  
  .mic-icon {
    width: 40px;
    height: 40px;
    fill: #e0e6ed;
    transition: fill 0.3s;
  }
  
  .mic-btn.recording .mic-icon {
    fill: white;
  }
  
  .status-text {
    font-size: 0.9rem;
    color: #94a3b8;
    text-align: center;
    min-height: 24px;
  }
  
  .status-text.recording { color: #ef4444; }
  .status-text.processing { color: #f59e0b; }
  .status-text.done { color: #00d4aa; }
  .status-text.error { color: #ef4444; }
  
  /* Waveform */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 40px;
    margin-bottom: 8px;
  }
  
  .wave-bar {
    width: 4px;
    background: linear-gradient(to top, #00d4aa, #7c3aed);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  
  .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 24px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 32px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 40px; animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { height: 32px; animation-delay: 0.5s; }
  .wave-bar:nth-child(7) { height: 24px; animation-delay: 0.6s; }
  .wave-bar:nth-child(8) { height: 16px; animation-delay: 0.7s; }
  .wave-bar:nth-child(9) { height: 8px; animation-delay: 0.8s; }
  
  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }
  
  .waveform.hidden { display: none; }
  
  /* Transcript */
  .transcript-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    min-height: 80px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.95rem;
    line-height: 1.6;
    color: #e0e6ed;
    display: none;
  }
  
  .transcript-box.show { display: block; }
  
  .transcript-box .placeholder {
    color: #475569;
    font-style: italic;
  }
  
  /* Actions */
  .actions {
    display: flex;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  
  .actions.show { opacity: 1; pointer-events: auto; }
  
  .btn {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  
  .btn-copy {
    background: linear-gradient(135deg, #00d4aa, #00b894);
    color: #0a0e17;
  }
  
  .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,170,0.3); }
  
  .btn-clear {
    background: rgba(255,255,255,0.1);
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  .btn-clear:hover { background: rgba(255,255,255,0.15); }
  
  .btn svg { width: 16px; height: 16px; }
  
  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,212,170,0.9);
    color: #0a0e17;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }
  
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  
  .toast.error {
    background: rgba(239,68,68,0.9);
    color: white;
  }
  
  /* Model selector */
  .model-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  
  .model-row select {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 6px 8px;
    color: #e0e6ed;
    font-size: 0.8rem;
  }
  
  .model-row select:focus { outline: none; border-color: #00d4aa; }
  
  /* Footer */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.7rem;
    color: #334155;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎙️ 语音输入</h1>
  <p class="subtitle">OpenClaw Voice Input — Powered by Whisper API</p>
  
  <!-- API Key -->
  <div class="api-section">
    <label>🔑 OpenAI API Key（可选，用于 Whisper API）</label>
    <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    <p class="hint">不填则使用浏览器原生语音识别（无需API）</p>
    <div class="model-row">
      <select id="modelSelect">
        <option value="whisper-1">Whisper API（需API Key）</option>
        <option value="browser">🌐 浏览器原生识别（免费）</option>
      </select>
    </div>
  </div>
  
  <!-- Mic Button -->
  <div class="mic-wrapper">
    <div class="waveform hidden" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    
    <button class="mic-btn" id="micBtn" title="按住说话">
      <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    
    <p class="status-text" id="statusText">点击开始录音</p>
  </div>
  
  <!-- Transcript -->
  <div class="transcript-box" id="transcriptBox">
    <span class="placeholder" id="transcriptText">识别结果将显示在这里...</span>
  </div>
  
  <!-- Actions -->
  <div class="actions" id="actions">
    <button class="btn btn-copy" id="copyBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      复制文字
    </button>
    <button class="btn btn-clear" id="clearBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      清空
    </button>
  </div>
  
  <p class="footer">支持中文、英文、日文、韩文等 100+ 语言<br>短句建议用浏览器模式，长文建议用 Whisper API</p>
</div>

<div class="toast" id="toast"></div>

<script>
// State
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recognition = null;
let finalTranscript = '';

// Elements
const micBtn = document.getElementById('micBtn');
const statusText = document.getElementById('statusText');
const waveform = document.getElementById('waveform');
const transcriptBox = document.getElementById('transcriptBox');
const transcriptText = document.getElementById('transcriptText');
const actions = document.getElementById('actions');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const apiKeyInput = document.getElementById('apiKey');
const modelSelect = document.getElementById('modelSelect');
const toast = document.getElementById('toast');

// Load saved settings
const savedKey = localStorage.getItem('openclaw_voice_api_key');
const savedModel = localStorage.getItem('openclaw_voice_model') || 'browser';
if (savedKey) apiKeyInput.value = savedKey;
modelSelect.value = savedModel;

// Save settings
apiKeyInput.addEventListener('change', () => {
  localStorage.setItem('openclaw_voice_api_key', apiKeyInput.value);
});
modelSelect.addEventListener('change', () => {
  localStorage.setItem('openclaw_voice_model', modelSelect.value);
});

// Toast
function showToast(msg, isError = false) {
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Browser Speech Recognition
function initBrowserRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('浏览器不支持语音识别，请使用 Whisper API', true);
    return null;
  }
  
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';
  
  recognition.onstart = () => {
    setUI('recording', '正在聆听...');
    waveform.classList.remove('hidden');
  };
  
  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += transcript;
      } else {
        interim += transcript;
      }
    }
    transcriptText.textContent = finalTranscript + interim;
    transcriptBox.classList.add('show');
    actions.classList.add('show');
  };
  
  recognition.onerror = (event) => {
    if (event.error !== 'no-speech') {
      showToast('识别错误: ' + event.error, true);
    }
    stopRecording();
  };
  
  recognition.onend = () => {
    if (isRecording) {
      recognition.start(); // Restart if still recording
    } else {
      setUI('done', '识别完成');
    }
  };
  
  return recognition;
}

// Set UI state
function setUI(state, text) {
  statusText.className = 'status-text ' + state;
  statusText.textContent = text;
  micBtn.classList.toggle('recording', state === 'recording');
  
  if (state !== 'recording') {
    waveform.classList.add('hidden');
  }
}

// Start recording
async function startRecording() {
  const mode = modelSelect.value;
  
  if (mode === 'browser') {
    // Browser native
    if (!recognition) {
      initBrowserRecognition();
    }
    if (!recognition) return;
    
    try {
      recognition.start();
      isRecording = true;
      finalTranscript = '';
      transcriptText.textContent = '';
      transcriptBox.classList.add('show');
      actions.classList.remove('show');
    } catch (e) {
      showToast('启动语音识别失败: ' + e.message, true);
    }
  } else {
    // Whisper API mode
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) {
      showToast('请先输入 OpenAI API Key', true);
      return;
    }
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      audioChunks = [];
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      
      mediaRecorder.onstart = () => {
        isRecording = true;
        finalTranscript = '';
        transcriptText.textContent = '';
        transcriptBox.classList.add('show');
        actions.classList.remove('show');
        setUI('recording', '正在录音...');
      };
      
      mediaRecorder.onstop = async () => {
        setUI('processing', '正在识别...');
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        
        try {
          const formData = new FormData();
          formData.append('file', audioBlob, 'recording.webm');
          formData.append('model', 'whisper-1');
          formData.append('language', 'zh');
          
          const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + apiKey },
            body: formData
          });
          
          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || 'API请求失败');
          }
          
          const data = await response.json();
          finalTranscript = data.text;
          transcriptText.textContent = finalTranscript;
          setUI('done', '识别完成 ✓');
          actions.classList.add('show');
          showToast('识别成功！');
        } catch (e) {
          showToast('识别失败: ' + e.message, true);
          setUI('error', '识别失败');
        }
        
        stream.getTracks().forEach(t => t.stop());
      };
      
      mediaRecorder.start();
    } catch (e) {
      showToast('无法访问麦克风: ' + e.message, true);
    }
  }
}

// Stop recording
function stopRecording() {
  const mode = modelSelect.value;
  
  if (mode === 'browser' && recognition) {
    recognition.stop();
  }
  
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  
  isRecording = false;
}

// Mic button events
micBtn.addEventListener('mousedown', () => { if (!isRecording) startRecording(); });
micBtn.addEventListener('mouseup', () => { if (isRecording) stopRecording(); });
micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!isRecording) startRecording(); });
micBtn.addEventListener('touchend', (e) => { e.preventDefault(); if (isRecording) stopRecording(); });

// Copy button
copyBtn.addEventListener('click', async () => {
  const text = transcriptText.textContent;
  if (!text || text === '识别结果将显示在这里...') {
    showToast('没有可复制的文字', true);
    return;
  }
  
  try {
    await navigator.clipboard.writeText(text);
    showToast('已复制到剪贴板！');
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板！');
  }
});

// Clear button
clearBtn.addEventListener('click', () => {
  finalTranscript = '';
  transcriptText.textContent = '识别结果将显示在这里...';
  transcriptBox.classList.remove('show');
  actions.classList.remove('show');
  setUI('idle', '点击开始录音');
});

// Keyboard shortcut: Space to record
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    if (!isRecording) startRecording();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    if (isRecording) stopRecording();
  }
});

setUI('idle', '点击开始录音（或按空格键）');
</script>
</body>
</html>
