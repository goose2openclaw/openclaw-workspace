<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#FFD700" stroke="#DAA520" stroke-width="3"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="60" ry="50" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Neck -->
  <path d="M80 100 Q75 70 90 50" stroke="#FFD700" stroke-width="25" fill="none" stroke-linecap="round"/>
  
  <!-- Head -->
  <circle cx="90" cy="50" r="30" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Beak -->
  <path d="M60 50 L40 55 L60 60 Z" fill="#FF8C00" stroke="#DAA520" stroke-width="1"/>
  
  <!-- Eye -->
  <circle cx="85" cy="45" r="8" fill="white"/>
  <circle cx="87" cy="45" r="4" fill="#000"/>
  <circle cx="89" cy="43" r="1.5" fill="white"/>
  
  <!-- Wing -->
  <path d="M80 120 Q60 140 90 150 Q120 160 130 130" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Feet -->
  <path d="M70 175 L60 190 L70 190 M60 185 L50 195 L60 195" stroke="#FF8C00" stroke-width="3" fill="none"/>
  <path d="M130 175 L140 190 L130 190 M140 185 L150 195 L140 195" stroke="#FF8C00" stroke-width="3" fill="none"/>
  
  <!-- Blush -->
  <ellipse cx="75" cy="58" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Smile -->
  <path d="M78 62 Q85 68 92 62" stroke="#DAA520" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
