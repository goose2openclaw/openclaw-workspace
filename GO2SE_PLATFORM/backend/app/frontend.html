<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="🪿 GO2SE 北斗七鑫量化交易平台" />
  <meta name="theme-color" content="#0A0E17" />
  <title>🪿 GO2SE - 北斗七鑫量化交易平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0E17;
      color: #E0E6ED;
      font-family: 'JetBrains Mono', 'Fira Code', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #app {
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    .title {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00D4AA 0%, #7C3AED 50%, #F59E0B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #64748B;
      margin-bottom: 2rem;
    }
    .status-panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem 3rem;
      display: inline-block;
      backdrop-filter: blur(10px);
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      font-size: 0.95rem;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #00D4AA;
      box-shadow: 0 0 8px #00D4AA;
    }
    .status-dot.warn { background: #F59E0B; box-shadow: 0 0 8px #F59E0B; }
    .status-label { color: #94A3B8; }
    .status-value { color: #E0E6ED; font-weight: 600; }
    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .links a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .links a.primary {
      background: linear-gradient(135deg, #00D4AA, #00B894);
      color: #0A0E17;
    }
    .links a.primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,170,0.3); }
    .links a.secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #94A3B8;
    }
    .links a.secondary:hover { background: rgba(255,255,255,0.1); color: #E0E6ED; }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #475569;
    }
    .footer a { color: #64748B; text-decoration: none; }
    .footer a:hover { color: #00D4AA; }
    .version {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.75rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="logo">🪿</div>
    <h1 class="title">GO2SE</h1>
    <p class="subtitle">北斗七鑫量化交易平台 · V7.5</p>

    <div class="status-panel">
      <div class="status-row">
        <div class="status-dot"></div>
        <span class="status-label">系统状态</span>
        <span class="status-value" id="sys-status">检测中...</span>
      </div>
      <div class="status-row">
        <span class="status-label">交易模式</span>
        <span class="status-value" id="trade-mode">--</span>
      </div>
      <div class="status-row">
        <span class="status-label">最大仓位</span>
        <span class="status-value" id="max-pos">--</span>
      </div>
      <div class="status-row">
        <span class="status-label">信号总数</span>
        <span class="status-value" id="signals">--</span>
      </div>
      <div class="status-row">
        <span class="status-label">总交易</span>
        <span class="status-value" id="trades">--</span>
      </div>
    </div>

    <div class="links">
      <a href="/docs" class="primary">📖 API文档</a>
      <a href="http://localhost:18789/" class="secondary">🖥️ 控制面板</a>
    </div>

    <div class="footer">
      <a href="https://github.com/goose2openclaw/openclaw-workspace">GitHub</a> ·
      北斗七鑫投资体系 · 25维度全向仿真
    </div>
  </div>

  <div class="version">v7.5.0</div>

  <script>
    fetch('/api/stats')
      .then(r => r.json())
      .then(d => {
        const data = d.data || d;
        document.getElementById('sys-status').textContent = '运行中 ✅';
        document.getElementById('trade-mode').textContent = data.trading_mode || 'unknown';
        document.getElementById('max-pos').textContent = ((data.max_position || 0) * 100).toFixed(0) + '%';
        document.getElementById('signals').textContent = data.total_signals || 0;
        document.getElementById('trades').textContent = data.total_trades || 0;
      })
      .catch(() => {
        document.getElementById('sys-status').textContent = '离线 ❌';
        document.getElementById('sys-status').style.color = '#EF4444';
      });
  </script>
</body>
</html>
