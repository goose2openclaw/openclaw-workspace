# 🪿 GO2SE Logrotate 配置
# 安装: sudo cp scripts/logrotate_go2se.conf /etc/logrotate.d/go2se
# 测试: sudo logrotate -d /etc/logrotate.d/go2se

/root/.openclaw/workspace/GO2SE_PLATFORM/*.log
/root/.openclaw/workspace/GO2SE_PLATFORM/backend/*.log
/root/.openclaw/workspace/GO2SE_PLATFORM/logs/*.log
/tmp/go2se*.log
/tmp/go2se_*.pid
{
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    maxsize 50M
    create 0644 root root
    sharedscripts
    postrotate
        # 向运行的 uvicorn 进程发送 SIGUSR1 以重新打开日志文件
        pkill -USR1 -f "uvicorn.*go2se" 2>/dev/null || true
    endscript
}
