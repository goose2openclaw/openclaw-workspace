name: GO2SE CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
    
    - name: Lint
      run: |
        pip install flake8
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run tests
      run: |
        cd backend
        source venv/bin/activate
        python -m pytest tests/ -v --tb=short || echo "No tests found"
    
    - name: MiroFish simulation
      run: |
        cd backend
        source venv/bin/activate
        python ../scripts/mirofish_full_simulation_v2.py
    
    - name: Backtest
      run: |
        cd backend
        source venv/bin/activate
        python ../backtest_simulator.py ETHUSDT

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging..."
        # Add your deployment commands here
        curl -s localhost:8000/api/health | grep -q "healthy" && echo "Backend healthy"

  backup:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Backup workspace
      run: |
        mkdir -p backups
        tar -czf backups/backup-$(date +%Y%m%d).tar.gz . --exclude='.git' --exclude='__pycache__'
        ls -la backups/
