<!--
GO2SE v7 — gstack Commands Panel
侧边栏gstack命令面板组件

Usage:
    <div id="gstack-panel"></div>
    <script src="gstack-panel.js"></script>
    <script>
        initGstackPanel('gstack-panel', { apiBase: '/api/gstack' });
    </script>
-->

<div class="gstack-container">
    <!-- Header -->
    <div class="gstack-header">
        <div class="gstack-logo">
            <span class="logo-icon">🪿</span>
            <span class="logo-text">GO2SE <span class="version">v7</span></span>
        </div>
        <span class="gstack-badge">+gstack</span>
    </div>
    
    <!-- Main Navigation -->
    <nav class="main-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
            <span class="icon">📊</span>
            <span class="label">总览</span>
        </a>
        <a href="#market" class="nav-item" data-page="market">
            <span class="icon">📈</span>
            <span class="label">市场</span>
        </a>
        <a href="#strategy" class="nav-item" data-page="strategy">
            <span class="icon">🎯</span>
            <span class="label">策略</span>
        </a>
        <a href="#signals" class="nav-item" data-page="signals">
            <span class="icon">🔔</span>
            <span class="label">信号</span>
        </a>
        <a href="#trading" class="nav-item" data-page="trading">
            <span class="icon">💱</span>
            <span class="label">交易</span>
        </a>
        <a href="#wallet" class="nav-item" data-page="wallet">
            <span class="icon">💰</span>
            <span class="label">钱包</span>
        </a>
        <a href="#settings" class="nav-item" data-page="settings">
            <span class="icon">⚙️</span>
            <span class="label">设置</span>
        </a>
    </nav>
    
    <!-- Divider -->
    <div class="divider">
        <span class="divider-text">🔧 gstack Commands</span>
    </div>
    
    <!-- gstack Commands Panel -->
    <div class="gstack-commands" id="gstack-commands">
        <!-- Loading State -->
        <div class="loading-commands">
            <span class="spinner">⏳</span>
            <span>加载gstack命令...</span>
        </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="action-btn" onclick="showGstackHelp()" title="gstack帮助">
            ❓
        </button>
        <button class="action-btn" onclick="refreshGstackStatus()" title="刷新状态">
            🔄
        </button>
    </div>
</div>

<!-- gstack Command Modal -->
<div class="gstack-modal" id="gstack-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">gstack Command</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modal-body">
            <!-- Dynamic content -->
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal()">关闭</button>
            <button class="btn-primary" id="modal-action">运行</button>
        </div>
    </div>
</div>

<!-- Strategy Flow Modal -->
<div class="gstack-modal" id="strategy-flow-modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>🎯 策略开发流水线</h3>
            <button class="close-btn" onclick="closeStrategyModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="flow-idea">
                <label>策略想法:</label>
                <textarea id="strategy-idea" placeholder="描述你的交易策略想法..."></textarea>
            </div>
            <div class="flow-steps" id="flow-steps">
                <!-- Steps will be rendered here -->
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeStrategyModal()">取消</button>
            <button class="btn-primary" onclick="runStrategyFlow()">🚀 启动流水线</button>
        </div>
    </div>
</div>

<script>
// === Global State ===
let gstackCommands = {};
let currentModalCommand = null;

// === Initialize ===
async function initGstackPanel(containerId, options = {}) {
    const apiBase = options.apiBase || '/api/gstack';
    const container = document.getElementById(containerId);
    
    try {
        // Fetch commands
        const response = await fetch(`${apiBase}/commands`);
        const data = await response.json();
        
        if (data.available) {
            gstackCommands = data.commands;
            renderCommands(container);
        } else {
            container.innerHTML = `
                <div class="loading-commands">
                    <span>⚠️</span>
                    <span>gstack未安装</span>
                    <small>${data.error}</small>
                </div>
            `;
        }
    } catch (err) {
        container.innerHTML = `
            <div class="loading-commands">
                <span>❌</span>
                <span>加载失败</span>
                <small>${err.message}</small>
            </div>
        `;
    }
}

function renderCommands(container) {
    // Group by category
    const grouped = {};
    gstackCommands.forEach(cmd => {
        if (!grouped[cmd.category]) {
            grouped[cmd.category] = [];
        }
        grouped[cmd.category].push(cmd);
    });
    
    // Category icons
    const icons = {
        startup: '🎯',
        ceo: '👔',
        eng: '⚙️',
        design: '🎨',
        code: '🔍',
        security: '🛡️',
        qa: '🧪',
        deploy: '🚀',
        monitor: '📊',
        tools: '🔧',
        safety: '⚠️'
    };
    
    let html = '';
    for (const [category, commands] of Object.entries(grouped)) {
        html += `
            <div class="gstack-category">
                <div class="category-header">
                    <span>${icons[category] || '📦'}</span>
                    <span>${category.toUpperCase()}</span>
                </div>
                <div class="category-commands">
                    ${commands.map(cmd => `
                        <button class="gstack-cmd" onclick="showCommandModal('${cmd.name}')">
                            <span class="cmd-icon">${icons[cmd.category] || '📦'}</span>
                            <span class="cmd-info">
                                <span class="cmd-name">${cmd.name}</span>
                                <span class="cmd-desc">${cmd.description}</span>
                            </span>
                            ${cmd.requires_browser ? '<span class="cmd-badge browser">🌐</span>' : ''}
                            ${cmd.requires_git ? '<span class="cmd-badge git">📦</span>' : ''}
                        </button>
                    `).join('')}
                </div>
            </div>
        `;
    }
    
    container.innerHTML = html;
}

// === Modal Functions ===
async function showCommandModal(command) {
    currentModalCommand = command;
    
    try {
        const response = await fetch(`/api/gstack/help/${command.replace('/', '')}`);
        const data = await response.json();
        
        if (data.error) {
            alert(data.error);
            return;
        }
        
        document.getElementById('modal-title').textContent = `${data.name} — ${data.category}`;
        document.getElementById('modal-body').innerHTML = `
            <p><strong>描述:</strong> ${data.description}</p>
            <p><strong>分类:</strong> ${data.category}</p>
            <p><strong>需要浏览器:</strong> ${data.requires_browser ? '✅' : '❌'}</p>
            <p><strong>需要Git:</strong> ${data.requires_git ? '✅' : '❌'}</p>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 16px 0;">
            <pre style="background: #0A0E17; padding: 12px; border-radius: 8px; font-size: 11px; overflow-x: auto; max-height: 300px;">${escapeHtml(data.skill_preview || 'No documentation available')}</pre>
        `;
        
        document.getElementById('gstack-modal').classList.add('active');
    } catch (err) {
        alert('Error loading command: ' + err.message);
    }
}

function closeModal() {
    document.getElementById('gstack-modal').classList.remove('active');
    currentModalCommand = null;
}

// === Strategy Flow ===
function showStrategyFlowModal() {
    document.getElementById('strategy-flow-modal').classList.add('active');
    
    // Initialize steps
    const steps = [
        { name: 'office-hours', label: '🎯 策略构思', desc: 'YC创业导师6问' },
        { name: 'plan-ceo-review', label: '👔 CEO评审', desc: '找10星策略方向' },
        { name: 'plan-eng-review', label: '⚙️ 工程评审', desc: '锁定技术架构' }
    ];
    
    const stepsContainer = document.getElementById('flow-steps');
    stepsContainer.innerHTML = steps.map((step, i) => `
        <div class="flow-step pending" id="step-${step.name}">
            <span class="step-status">${i + 1}</span>
            <div class="step-info">
                <div class="step-name">${step.label}</div>
                <div class="step-desc">${step.desc}</div>
            </div>
        </div>
    `).join('');
}

function closeStrategyModal() {
    document.getElementById('strategy-flow-modal').classList.remove('active');
}

async function runStrategyFlow() {
    const idea = document.getElementById('strategy-idea').value;
    
    if (!idea.trim()) {
        alert('请输入策略想法');
        return;
    }
    
    try {
        const response = await fetch('/api/gstack/strategy-flow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idea })
        });
        
        const data = await response.json();
        
        // Update step statuses
        data.steps.forEach((step, i) => {
            const el = document.getElementById(`step-${step.step}`);
            if (el) {
                el.className = `flow-step ${step.status === '✅' ? 'completed' : ''}`;
                el.querySelector('.step-status').textContent = step.status;
            }
        });
        
        if (data.ready_for_implementation) {
            alert('🎉 策略开发流程完成！准备进入实现阶段。');
        }
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

// === Utility Functions ===
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function refreshGstackStatus() {
    try {
        const response = await fetch('/api/gstack/status');
        const data = await response.json();
        alert(`gstack状态: ${data.status}\n命令数: ${data.total_commands}`);
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

function showGstackHelp() {
    alert('🪿 GO2SE v7 + gstack\n\n29个专家角色帮你开发交易策略！\n\n使用方法:\n1. 点击侧边栏命令运行\n2. 使用 /office-hours 构思策略\n3. 使用策略流水线快速开发\n\n安装来源: github.com/garrytan/gstack');
}

// === Auto-initialize ===
document.addEventListener('DOMContentLoaded', function() {
    const panel = document.getElementById('gstack-commands');
    if (panel) {
        initGstackPanel('gstack-commands');
    }
});
</script>
